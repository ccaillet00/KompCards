name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kompcards_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ./backend

      - name: Push schema to database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kompcards_test
        run: bun db:push
        working-directory: ./backend

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kompcards_test
          BETTER_AUTH_SECRET: test-secret-key-that-is-long-enough-for-testing
          BETTER_AUTH_URL: http://localhost:3000
        run: bun test
        working-directory: ./backend

      - name: Run linting (optional)
        run: bunx eslint .